name: Benchmark (Main)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchmark-main
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build shared packages
        run: |
          pnpm --filter shared-data build
          pnpm --filter bench-harness build

      - name: Build all framework apps
        run: pnpm build:all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: bench:main
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run full benchmark suite
        run: |
          docker run --cpus=2 --memory=4g \
            -e BENCHMARK_RUNS=25 \
            -e BENCHMARK_WARMUP=5 \
            -v ${{ github.workspace }}/results:/app/results \
            bench:main

      - name: Upload baseline for PR comparison
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: results/latest.json
          overwrite: true

      - name: Generate report
        run: |
          pnpm --filter results-site build
          pnpm --filter results-site generate

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/latest.json results/archive/ || true
          git diff --staged --quiet || git commit -m "chore: update benchmark results [skip ci]"
          git push

      - name: Deploy results site
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: results/site
