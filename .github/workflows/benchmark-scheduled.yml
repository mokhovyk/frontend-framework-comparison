name: Benchmark (Weekly)

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  
jobs:
  update-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Update framework versions
        run: |
          cd frameworks/react && pnpm update react react-dom react-router && cd ../..
          cd frameworks/angular && pnpm update @angular/core @angular/common @angular/router @angular/forms @angular/cli && cd ../..
          cd frameworks/vue && pnpm update vue vue-router && cd ../..
          cd frameworks/svelte && pnpm update svelte svelte-routing && cd ../..

      - name: Install dependencies
        run: pnpm install

      - name: Build shared packages
        run: |
          pnpm --filter shared-data build
          pnpm --filter bench-harness build

      - name: Build all framework apps
        run: pnpm build:all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: bench:weekly
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run full benchmark suite
        run: |
          docker run --cpus=2 --memory=4g \
            -e BENCHMARK_RUNS=25 \
            -e BENCHMARK_WARMUP=5 \
            -v ${{ github.workspace }}/results:/app/results \
            bench:weekly

      - name: Fix results directory permissions
        run: sudo chown -R $(id -u):$(id -g) results

      - name: Generate report
        run: |
          pnpm --filter results-site build
          pnpm --filter results-site generate

      - name: Log framework versions
        run: |
          echo "Framework versions used in this run:" >> $GITHUB_STEP_SUMMARY
          node -e "
            const p = require;
            const fws = ['react', 'angular', 'vue', 'svelte'];
            for (const fw of fws) {
              try {
                const pkg = require('./frameworks/' + fw + '/node_modules/' + (fw === 'angular' ? '@angular/core' : fw) + '/package.json');
                console.log(fw + ': ' + pkg.version);
              } catch { console.log(fw + ': unknown'); }
            }
          " >> $GITHUB_STEP_SUMMARY

      - name: Commit results and version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ pnpm-lock.yaml frameworks/*/package.json || true
          git diff --staged --quiet || git commit -m "chore: weekly benchmark run with latest framework versions"
          git push
